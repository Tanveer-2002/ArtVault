<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="../CSS/Registration.css">
</head>
<body>
    <div id="login">
        <div id="login-header"></div>

        <div id="login_box">
            <form action="" id="Login_form">

                <div>
                    <label for="" class="label">E-Mail :</label>
                    <input type="text" name="" id="email" class="box" placeholder="Enter E-Mail here">
                </div>

                <div>
                    <label for="" class="label">Password :</label>
                    <input type="password" name="" id="password" class="box" placeholder="Enter Password here">
                </div>

                <div>
                    <label for="" class="label">Confirm Password :</label>
                    <input type="password" name="" id="confirm_password" class="box" placeholder="Confirm Password here">
                </div>

                <div>
                    <label for="" class="label">Register as:</label>
                  <div id="radio" >
                    <input type="radio" id="artist" name="register_as" value="Artist ">
                    <label for="artist">Artist</label>
                    <input type="radio" id="visitor" name="register_as" value="Visitor">
                    <label for="visitor">Visitor</label>
                  </div>
                </div>
            
            <button id="B1">Create Account</button>
            <span id="aha">Already have an account? <a href="">login</a></span>
         </form>

         </div>
        
    </div>
</body>
</html>
