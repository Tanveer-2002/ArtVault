<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="../CSS/EditProfile.css">
</head>
    <body>
        <nav>

        </nav>
        <main>
           <div id="sideBar"></div>

           <div class="content">

            <h1 class="page-title">Edit Profile</h1>
                
                <div class="profile-header-card">
                    <div class="profile-info">

                        <div class="image-edit"> 
                            <div class="image"></div>
                            <button>Edit</button>
                       </div>

                     

                        <div class="profile-text">
                            <div class="name-row">
                                <h2>Sarah K.</h2>
                                <span class="badge">Visitor</span>
                                <button>Edit</button>
                            </div>
                            <p class="join-date">Join Date: March 2026</p>
                        </div>

                    </div>
                </div>

                <div class="profile-details-row">
                    <div class="details-card">
                        <div class="info-row">
                            <span class="info-label">Username :</span>
                            <span class="info-value">i_m_sarah_k</span> 
                            <button>Edit</button>
                        </div>
                        <div class="info-row">
                            <span class="info-label">Email :</span>
                            <span class="info-value">sarah_k123@gmail.com</span>
                             <button>Edit</button>
                        </div>
                        <div class="info-row">
                            <span class="info-label">Location :</span>
                            <span class="info-value">Dhaka, Bangladesh</span>
                            <button>Edit</button>
                        </div>
                    </div>

                    <div class="aboutme">
                        <div class="about-me-edit">
                            <h3>About me:</h3>
                            <button>Edit</button>
                        </div>
                        <p>I am Sarah Khan</p>
                    </div>
                </div>

                <div class="bottom-row">
                    
                <div class="security">
            
                    <div class="form">
                         <h2>Security</h2>
                        <form action="">
                            <label for="">Current Password :</label>
                            <input type="text" class="password-input">

                            <label for="">New Password :</label>
                            <input type="text" class="password-input">

                            <label for="">Confirm Password :</label>
                            <input type="text" class="password-input">
                        </form>

                    </div>

                </div>

                <div class="Buttons">
                    <button class="button" id="update">Update</button>
                    <button class="button" id="discard">Discard</button>
                </div>

                </div>




                



            </div>
               

                

        </main>
    </body>
</html>
